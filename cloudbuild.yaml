steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/yebomart-api:$COMMIT_SHA', '.']

  # Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/yebomart-api:$COMMIT_SHA']

  # Deploy container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'yebomart-api'
      - '--image'
      - 'gcr.io/$PROJECT_ID/yebomart-api:$COMMIT_SHA'
      - '--region'
      - 'europe-west1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '8080'
      - '--update-env-vars'
      - 'NODE_ENV=production,R2_ACCOUNT_ID=9f15f12d867a59b212ed2ae3cf4615ca,R2_BUCKET_NAME=yebomart-images,R2_PUBLIC_URL=https://pub-9f15f12d867a59b212ed2ae3cf4615ca.r2.dev'
      - '--update-secrets'
      - 'STRIPE_SECRET_KEY=YEBOMART__STRIPE_SECRET_KEY:latest,STRIPE_WEBHOOK_SECRET=YEBOMART__STRIPE_WEBHOOK_SECRET:latest'

images:
  - 'gcr.io/$PROJECT_ID/yebomart-api:$COMMIT_SHA'

# Required because the trigger runs under a custom service account
# (yebomart-runtime@hiyebo). Without this, Cloud Build refuses to start
# with "if 'build.service_account' is specified, the build must either
# specify 'build.logs_bucket' or use CLOUD_LOGGING_ONLY logging".
options:
  logging: CLOUD_LOGGING_ONLY
