steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/yebomart-api:$COMMIT_SHA', '.']

  # Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/yebomart-api:$COMMIT_SHA']

  # Deploy container image to Cloud Run.
  # Service name is parameterised so the same cloudbuild.yaml powers
  # both the prod trigger (substitutes _SERVICE=yebomart-api-prod) and
  # the dev trigger (_SERVICE=yebomart-api-dev). Without this, the deploy
  # was creating a third zombie service called bare "yebomart-api" under
  # the default compute SA — that's how a "successful" Cloud Build was
  # producing a totally orphaned revision.
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE}'
      - '--image'
      - 'gcr.io/$PROJECT_ID/yebomart-api:$COMMIT_SHA'
      - '--region'
      - 'europe-west1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--service-account=yebomart-runtime@hiyebo.iam.gserviceaccount.com'
      - '--port'
      - '8080'
      - '--update-env-vars'
      - 'NODE_ENV=production,R2_ACCOUNT_ID=9f15f12d867a59b212ed2ae3cf4615ca,R2_BUCKET_NAME=yebomart-images,R2_PUBLIC_URL=https://pub-9f15f12d867a59b212ed2ae3cf4615ca.r2.dev,YEBOPAY_BASE_URL=${_YEBOPAY_BASE_URL}'
      # YEBOPAY_API_KEY binds the merchant key provisioned in Phase 1.5.
      # Dev trigger overrides _YEBOPAY_API_KEY_SECRET (→ _DEV variant) and
      # _YEBOPAY_BASE_URL (→ dev yebopay service).
      - '--update-secrets'
      - 'YEBOPAY_API_KEY=${_YEBOPAY_API_KEY_SECRET}:latest'

substitutions:
  _SERVICE: yebomart-api-prod
  _YEBOPAY_API_KEY_SECRET: YEBOMART__YEBOPAY_API_KEY
  _YEBOPAY_BASE_URL: https://yebopay-api-prod-dysic27f5a-ew.a.run.app

images:
  - 'gcr.io/$PROJECT_ID/yebomart-api:$COMMIT_SHA'

# Required because the trigger runs under a custom service account
# (yebomart-runtime@hiyebo). Without this, Cloud Build refuses to start
# with "if 'build.service_account' is specified, the build must either
# specify 'build.logs_bucket' or use CLOUD_LOGGING_ONLY logging".
options:
  logging: CLOUD_LOGGING_ONLY
